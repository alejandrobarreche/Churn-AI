version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_server
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin  # Cámbiala en producción
      POSTGRES_DB: churn_db                # Tu base de datos independiente
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local